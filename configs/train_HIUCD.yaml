# Train Semantic Change Detection on SECOND.
# Update `dataset_root` to your local SECOND path if needed.

# ---- VMamba / VSSM backbone config ----
cfg: MambaFCS/changedetection/configs/vssm1/vssm_base_224.yaml
opts: null
pretrained_weight_path: MambaFCS/pretrained_weight/vssm_base_0229_ckpt_epoch_237.pth

# ---- Dataset ----
dataset: Hi-UCD
type: train

# Dataset root should contain: train/ and test/ subfolders.
dataset_root: $SLURM_TMPDIR/Hi-UCD_formatted
train_dataset_path: $SLURM_TMPDIR/Hi-UCD_formatted/train
test_dataset_path: $SLURM_TMPDIR/Hi-UCD_formatted/val

# List files are resolved relative to `dataset_root` when not absolute.
train_data_list_paths:
  - train.txt
test_data_list_path: val.txt

# ---- Training ----
shuffle: true
batch_size: 2
crop_size: 512
start_iter: 0
max_iters: 800000
learning_rate: 1.0e-4
weight_decay: 5.0e-4
num_classes: 10

# ---- Checkpointing (fine-tuning from SECOND) ----
# `resume` = poids de départ du fine-tuning (chargés uniquement au 1er lancement).
# En cas d'annulation SLURM (TIME LIMIT), un fichier `last_checkpoint.pth` est
# écrit dans model_param_path/model_saving_name toutes les `save_interval` itérations.
# Il suffit de resoumettre le même job : l'entraînement reprend automatiquement
# à la dernière itération sauvegardée (modèle + optimiseur + scheduler).
resume: MambaFCS/pretrained_weight/SECOND_SeK_0.255.pth
optim_path: null
scheduler_path: null
save_interval: 2000

# ---- Outputs ----
model_type: MambaSCD_base
model_param_path: MambaFCS/saved_models
model_saving_name: HiUCD_FULL

# ---- Runtime ----
cuda: true
cuda_device: 7
do_validation: true
